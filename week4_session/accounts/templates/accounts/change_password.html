<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>비밀번호 변경</title>
</head>
<body>
    <h1>비밀번호 변경</h1>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">변경하기</button>
    </form>

    <a href="{% url 'profile' %}">
        <button type="button">돌아가기</button>
    </a>
</body>
</html>
